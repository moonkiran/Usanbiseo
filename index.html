<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>우산비서</title>
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
</head>

<body>

  <div id="app">
    <div id="splash" class="screen">
      <img src="images/splash.jpg" alt="우산비서 스플래시" />
    </div>
    <div id="main" class="screen hidden">
      <img src="images/main.jpg" alt="우산비서 메인" />
      <div class="action-container">
        <a href="login.html" class="btn btn-login" onclick="localStorage.removeItem('fromSignup')">로그인</a>
        <a href="signup.html" class="btn btn-signup" onclick="localStorage.setItem('fromSignup', 'true')">회원가입</a>
      </div>
    </div>
  </div>

  <script>
    window.addEventListener("load", function () {
      var splash = document.getElementById("splash");
      var main = document.getElementById("main");

      setTimeout(function () {
        splash.classList.add("fade-out");
        setTimeout(function () {
          splash.classList.add("gone");
          main.classList.remove("hidden");
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              main.classList.add("visible");
            });
          });
        }, 400);
      }, 800);
    });
  </script>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100vh;
      background: #78c8e8;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* 항상 390x844 고정 크기, 절대 늘어나지 않음 */
    #app {
      position: relative;
      width: 390px;
      height: 844px;
      flex-shrink: 0;
      overflow: hidden;
      border-radius: 40px;
      box-shadow: 0 8px 60px rgba(0, 0, 0, 0.25);
    }

    /* 모바일: 화면에 꽉 차게 */
    @media (max-width: 430px) {
      body {
        background: #ffffff;
        height: 100vh;
        height: 100dvh;
        align-items: flex-start;
      }

      #app {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        border-radius: 0;
        box-shadow: none;
      }
    }

    .screen {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .screen img {
      width: 100%;
      height: 100%;
      display: block;
    }

    #splash img {
      object-fit: cover;
      object-position: center bottom;
    }

    #main img {
      object-fit: cover;
      object-position: center top;
    }

    #splash {
      opacity: 1;
      transition: opacity 0.4s ease-in-out;
      z-index: 10;
    }

    #splash.fade-out {
      opacity: 0;
    }

    #splash.gone {
      display: none;
    }

    #main {
      opacity: 0;
      transition: opacity 0.8s ease-in-out;
      z-index: 5;
    }

    #main.hidden {
      visibility: hidden;
    }

    #main.visible {
      opacity: 1;
      visibility: visible;
    }

    /* 버튼 컨테이너 및 프리미엄 디자인 */
    .action-container {
      position: absolute;
      bottom: 50px;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 0 24px;
      z-index: 15;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 50px;
      border-radius: 8px;
      text-decoration: none;
      cursor: pointer;
      border: none;
      outline: none;
      letter-spacing: -0.5px;

      /* 첫 렌더링 시 아래쪽에 숨어 있음 */
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.2s ease, box-shadow 0.2s ease;
    }

    /* 메인 화면 활성화 시 버튼들이 튕기며 등장 */
    #main.visible .btn {
      opacity: 1;
      transform: translateY(0);
    }

    /* 버튼 등장 시차 딜레이 (Staggered Effect) */
    #main.visible .btn-login {
      transition-delay: 0.1s;
    }
    #main.visible .btn-signup {
      transition-delay: 0.22s;
    }

    .btn-login {
      background: #54b6ec;
      color: #ffffff;
      box-shadow: 0 5px 15px rgba(84, 182, 236, 0.4);
    }

    .btn-login:active {
      transform: translateY(0) scale(0.97) !important;
      background: #45a4d8;
    }

    .btn-signup {
      background: #ffe5a3;
      color: #000000;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
    }

    .btn-signup:active {
      transform: translateY(0) scale(0.97) !important;
      background: #ebd090;
    }

    body,
    input,
    button,
    select,
    textarea {
      font-family: 'Manrope', sans-serif;
      font-weight: 400;
      font-size: 16px;
    }

    .page-title,
    .login-title,
    .signup-title {
      font-family: 'Jua', sans-serif;
      font-weight: 400;
      font-size: 22px;
    }
  </style>
</body>

</html>

<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>로그인 - 우산비서</title>
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
  <!-- Google Identity Services (GSI) SDK -->
  <script src="https://accounts.google.com/gsi/client" onload="initGoogleAuth()" async defer></script>
</head>

<body>
  <!-- 상단 헤더 -->
  <div class="header-area">
    <h1 class="login-title">로그인</h1>
  </div>

  <div class="login-container">
    <!-- 단계 인디케이터 -->
    <div class="step-indicator">
      <div class="step-line"></div>
      <div class="step-dot blue"></div>
      <div class="step-line"></div>
      <div class="step-dot yellow"></div>
      <div class="step-line"></div>
      <div class="step-dot blue"></div>
      <div class="step-line"></div>
    </div>

    <!-- 입력 폼 + 확인 버튼 -->
    <div class="form-section">
      <div class="inputs-wrapper">
        <div class="input-group">
          <label class="input-label" for="email">이메일</label>
          <input id="email" class="input-field" type="email" placeholder="example@email.com">
        </div>
        <div class="input-group">
          <label class="input-label" for="password">비밀번호</label>
          <div class="password-wrapper">
            <input id="password" class="input-field" type="password" placeholder="••••••••">
            <button class="toggle-pw" type="button" onclick="togglePassword()" aria-label="비밀번호 보기">
              <svg id="eye-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- 확인 버튼 -->
      <button class="confirm-btn" type="button" onclick="doLogin()">확인</button>
    </div>

    <!-- 자동 로그인 체크박스 -->
    <div class="auto-login-row">
      <input type="checkbox" id="autoLogin" class="auto-login-checkbox">
      <label for="autoLogin" class="auto-login-label">다음부터 자동로그인</label>
    </div>

    <!-- OR 구분선 -->
    <div class="or-divider">
      <span class="or-text">OR</span>
    </div>

    <!-- 소셜 로그인 버튼 -->
    <div class="social-btns">
      <button class="social-btn apple" type="button" onclick="socialLogin('apple')">
        <span class="social-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
          </svg>
        </span>
        애플 계정으로 로그인하기
      </button>

      <button class="social-btn google" type="button" onclick="socialLogin('google')">
        <span class="social-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
        </span>
        구글 계정으로 로그인하기
      </button>

      <button class="social-btn naver" type="button" onclick="socialLogin('naver')">
        <span class="social-icon">
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTYTGQvAcMGQ1WIoku5L0iw6j-why05sXnwKA&s" alt="Naver" style="width: 18px; height: 18px; object-fit: contain; border-radius: 3px;">
        </span>
        네이버 계정으로 로그인하기
      </button>
    </div>

    <!-- 하단 링크 -->
    <div class="bottom-links">
      <a href="find_pw.html" class="bottom-link">비밀번호 찾기</a>
      <div class="bottom-divider"></div>
      <a href="signup.html" class="bottom-link">회원가입</a>
    </div>
  </div>

  <!-- 테스터/데모용 가상 소셜 로그인 모달 -->
  <div id="social-modal" class="social-modal-overlay" style="display: none;">
    <div class="social-modal-content">
      <div class="social-modal-header">
        <span id="modal-provider-logo" class="modal-logo"></span>
        <h3 id="modal-title">소셜 로그인</h3>
        <button class="close-modal-btn" onclick="closeSocialModal()">&times;</button>
      </div>
      <div class="social-modal-body">
        <div class="user-avatar-area">
          <div class="user-avatar" id="modal-avatar">👤</div>
          <p class="demo-notice">테스터(데모) 계정으로 연결됩니다.</p>
        </div>
        <div class="modal-info-box">
          <p><strong>제공 정보:</strong> 이메일, 프로필 이름</p>
          <p class="info-desc">우산비서 서비스 제공을 위해 위 정보 수집 및 이용에 동의합니다.</p>
        </div>
        <button class="modal-submit-btn" id="modal-submit" onclick="completeSocialLogin()">동의하고 시작하기</button>
      </div>
    </div>
  </div>

  <script>
    function togglePassword() {
      const pw = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.innerHTML = `
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        `;
      } else {
        pw.type = 'password';
        icon.innerHTML = `
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        `;
      }
    }

    function doLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) {
        alert('이메일과 비밀번호를 입력해주세요.');
        return;
      }
      // 로그인 정보 저장
      localStorage.setItem('userEmail', email);
      localStorage.setItem('userName', email.split('@')[0]);
      localStorage.setItem('isLoggedIn', 'true');
      localStorage.setItem('loginType', 'email');

      // 로그인 성공 시 회원가입에서 넘어왔는지 여부 체크
      if (localStorage.getItem('fromSignup') === 'true') {
        localStorage.removeItem('fromSignup');
        location.href = 'welcome.html';
      } else {
        location.href = 'dashboard.html';
      }
    }

    // 구글 OAuth 및 가상 소셜 로그인 처리 변수
    let currentProvider = '';
    let tokenClient;

    // 구글 Identity Services SDK 초기화
    function initGoogleAuth() {
      // ⚠️ 여기에 구글 클라이언트 ID를 입력해야 실제 연동이 완료됩니다!
      // 예: '1234567890-abcdef.apps.googleusercontent.com'
      const GOOGLE_CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com';

      if (GOOGLE_CLIENT_ID.startsWith('YOUR_')) {
        console.warn('Google Client ID가 설정되지 않아 구글 실제 로그인은 데모 모드로 동작합니다.');
        return;
      }

      try {
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: GOOGLE_CLIENT_ID,
          scope: 'https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email',
          callback: (tokenResponse) => {
            if (tokenResponse && tokenResponse.access_token) {
              // 액세스 토큰으로 구글의 사용자 정보 요청
              fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                headers: { Authorization: `Bearer ${tokenResponse.access_token}` }
              })
                .then(res => res.json())
                .then(userInfo => {
                  // 구글에서 제공하는 실제 사용자 프로필 정보 저장
                  localStorage.setItem('userEmail', userInfo.email);
                  localStorage.setItem('userName', userInfo.name);
                  localStorage.setItem('userPicture', userInfo.picture || '');
                  localStorage.setItem('isLoggedIn', 'true');
                  localStorage.setItem('loginType', 'google');

                  // 로그인 완료 시 페이지 이동
                  if (localStorage.getItem('fromSignup') === 'true') {
                    localStorage.removeItem('fromSignup');
                    location.href = 'welcome.html';
                  } else {
                    location.href = 'dashboard.html';
                  }
                })
                .catch(err => {
                  console.error('구글 프로필 획득 실패:', err);
                  alert('사용자 정보를 가져오는 도중 오류가 발생했습니다.');
                });
            }
          },
        });
      } catch (e) {
        console.error('Google Auth SDK 초기화 실패:', e);
      }
    }

    function socialLogin(provider) {
      if (provider === 'google') {
        const GOOGLE_CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com';
        // 클라이언트 ID가 실제 입력된 경우에만 진짜 소셜 로그인 작동
        if (!GOOGLE_CLIENT_ID.startsWith('YOUR_')) {
          if (tokenClient) {
            tokenClient.requestAccessToken();
            return;
          } else {
            alert('구글 API를 불러오는 중입니다. 잠시 후 다시 시도해 주세요.');
            return;
          }
        }
      }

      // 구글 클라이언트 ID가 없거나, 다른 소셜 로그인(네이버, 애플)인 경우 모달을 띄워 데모 처리
      currentProvider = provider;
      const modal = document.getElementById('social-modal');
      const logo = document.getElementById('modal-provider-logo');
      const title = document.getElementById('modal-title');
      const submitBtn = document.getElementById('modal-submit');
      const avatar = document.getElementById('modal-avatar');

      logo.className = 'modal-logo ' + provider;
      submitBtn.className = 'modal-submit-btn ' + provider;

      if (provider === 'apple') {
        logo.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="#ffffff" xmlns="http://www.w3.org/2000/svg"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>`;
        title.innerText = 'Apple 계정으로 로그인';
        avatar.innerHTML = `<svg width="40" height="40" viewBox="0 0 24 24" fill="#1a1a1a" xmlns="http://www.w3.org/2000/svg"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>`;
      } else if (provider === 'google') {
        logo.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="#ffffff" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09zM12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23zM5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62zM12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>`;
        title.innerText = 'Google 계정으로 로그인 (데모)';
        avatar.innerHTML = `<svg width="40" height="40" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>`;
      } else if (provider === 'naver') {
        logo.innerHTML = `<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTYTGQvAcMGQ1WIoku5L0iw6j-why05sXnwKA&s" alt="Naver" style="width: 16px; height: 16px; object-fit: contain; border-radius: 2px;">`;
        title.innerText = '네이버 계정으로 로그인';
        avatar.innerHTML = `<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTYTGQvAcMGQ1WIoku5L0iw6j-why05sXnwKA&s" alt="Naver" style="width: 44px; height: 44px; object-fit: contain; border-radius: 8px;">`;
      }

      modal.style.display = 'flex';
    }

    function closeSocialModal() {
      document.getElementById('social-modal').style.display = 'none';
    }

    function completeSocialLogin() {
      let snsName = '';
      let defaultEmail = '';

      if (currentProvider === 'apple') {
        snsName = '애플 테스터';
        defaultEmail = 'apple_tester@apple.com';
      } else if (currentProvider === 'google') {
        snsName = '구글 테스터';
        defaultEmail = 'google_tester@gmail.com';
      } else if (currentProvider === 'naver') {
        snsName = '네이버 테스터';
        defaultEmail = 'naver_tester@naver.com';
      }

      localStorage.setItem('userEmail', defaultEmail);
      localStorage.setItem('userName', snsName);
      localStorage.setItem('isLoggedIn', 'true');
      localStorage.setItem('loginType', currentProvider);

      closeSocialModal();

      if (localStorage.getItem('fromSignup') === 'true') {
        localStorage.removeItem('fromSignup');
        location.href = 'welcome.html';
      } else {
        location.href = 'dashboard.html';
      }
    }
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #f7f9fc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* 상단 헤더 (로그인 타이틀) */
    .header-area {
      width: 100%;
      text-align: center;
      padding: 24px 0 16px;
      border-bottom: 1px solid #e2eaf0;
      background-color: #f7f9fc;
    }

    .login-title {
      color: #333;
      letter-spacing: -0.5px;
    }

    /* 메인 컨테이너 */
    .login-container {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      padding: 32px 28px 40px;
      background-color: #f7f9fc;
    }

    /* 진행 단계 인디케이터 */
    .step-indicator {
      display: flex;
      align-items: center;
      width: 100%;
      margin-bottom: 40px;
    }

    .step-line {
      flex: 1;
      height: 1.5px;
      background-color: #d6e8f4;
    }

    .step-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin: 0 4px;
    }

    .step-dot.blue {
      background-color: #61c2e6;
    }

    .step-dot.yellow {
      background-color: #fae178;
      width: 16px;
      height: 16px;
    }

    /* 입력 폼 영역 */
    .form-section {
      width: 100%;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 24px;
    }

    .inputs-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-label {
      color: #333;
      line-height: 20px;
    }

    .input-field {
      width: 100%;
      height: 48px;
      background-color: #ffffff;
      border: 1.5px solid #7bc6e8;
      border-radius: 6px;
      padding: 0 14px;
      color: #333;
      outline: none;
    }

    .input-field::placeholder {
      color: #999;
    }

    .password-wrapper {
      position: relative;
    }

    .password-wrapper .input-field {
      padding-right: 44px;
    }

    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .toggle-pw svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: #555;
      stroke-width: 2;
    }

    /* 확인 버튼 */
    .confirm-btn {
      width: 76px;
      height: 140px;
      background-color: #61c2e6;
      border: none;
      border-radius: 6px;
      color: #ffffff;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 28px;
      box-shadow: 0 4px 10px rgba(97, 194, 230, 0.3);
    }

    /* 자동로그인 */
    .auto-login-row {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      margin-bottom: 24px;
    }

    .auto-login-checkbox {
      width: 18px;
      height: 18px;
      border: 1px solid #cbd5e1;
